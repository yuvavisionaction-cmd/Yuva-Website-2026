<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Vimarsh by YUVA India</title>
    <meta name="description" content="Explore memories from Vimarsh - India's premier youth conference by YUVA India.">
    <meta name="keywords" content="YUVA, Vimarsh, Gallery, Youth Conference, India, Photos, Memories">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Gallery | Vimarsh by YUVA India">
    <meta property="og:description" content="Explore memories from Vimarsh - India's youth-led movement for change.">
    <meta property="og:image" content="https://yuva.ind.in/Images/Vimarsh2025_logo.jpg">
    <meta property="og:url" content="https://yuva.ind.in/vimarsh/gallery">
    
    <link rel="shortcut icon" href="/Images/Vimarsh2025_logo.jpg" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fffaf5 0%, #f5e9da 100%);
        }

        /* Gallery Container */
        .gallery-container {
            width: 100%;
            min-height: 100vh;
            padding: 40px 5%;
        }

        /* Header */
        .gallery-header {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }

        .gallery-header::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 5px;
            background: linear-gradient(90deg, #8b0000, #b08d57);
            border-radius: 10px;
        }

        .gallery-title {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #8b0000 0%, #b08d57 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            margin-top: 30px;
            letter-spacing: -1px;
        }

        .gallery-subtitle {
            font-size: 1.2rem;
            color: #666;
            font-weight: 400;
        }

        /* Filter Buttons */
        .filter-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 50px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            max-width: 1300px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 8px 32px rgba(139, 0, 0, 0.1);
        }

        .filter-btn {
            padding: 14px 28px;
            border: 2px solid #8b0000;
            border-radius: 50px;
            background: white;
            color: #8b0000;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .filter-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: #8b0000;
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
            z-index: 0;
        }

        .filter-btn:hover::before,
        .filter-btn.active::before {
            width: 400px;
            height: 400px;
        }

        .filter-btn span {
            position: relative;
            z-index: 1;
        }

        .filter-btn:hover,
        .filter-btn.active {
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(139, 0, 0, 0.3);
        }

        .back-btn {
            padding: 14px 28px;
            border: 2px solid #b08d57;
            border-radius: 50px;
            background: white;
            color: #b08d57;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .back-btn:hover {
            background: #b08d57;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(176, 141, 87, 0.3);
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-item {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            aspect-ratio: 1;
        }

        .gallery-item:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 50px rgba(139, 0, 0, 0.25);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-item.hide {
            display: none;
        }

        /* Loading State */
        .gallery-loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .spinner {
            border: 5px solid rgba(139, 0, 0, 0.1);
            border-top: 5px solid #8b0000;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .gallery-loading p {
            font-size: 1.1rem;
            font-weight: 500;
            color: #666;
        }

        .gallery-empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
        }

        .gallery-empty p {
            font-size: 1.2rem;
            color: #8b0000;
            font-weight: 600;
        }

        .gallery-error {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .gallery-error p {
            font-size: 1.2rem;
            color: #8b0000;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .gallery-error button {
            padding: 12px 35px;
            background: #8b0000;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(139, 0, 0, 0.3);
            font-family: 'Poppins', sans-serif;
        }

        .gallery-error button:hover {
            background: #6d0000;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(139, 0, 0, 0.4);
        }

        /* Lightbox */
        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        #lightbox.active {
            display: flex;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 50px;
            font-size: 50px;
            color: white;
            cursor: pointer;
            transition: transform 0.3s;
            z-index: 10000;
        }

        .lightbox-close:hover {
            transform: scale(1.2);
            color: #f5e9da;
        }

        .lightbox-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 60px;
            color: white;
            cursor: pointer;
            padding: 20px;
            transition: color 0.3s;
            user-select: none;
            z-index: 10000;
        }

        .lightbox-arrow:hover {
            color: #f5e9da;
        }

        .lightbox-arrow.left {
            left: 40px;
        }

        .lightbox-arrow.right {
            right: 40px;
        }

        /* Scroll Buttons */
        .scroll-buttons {
            position: fixed;
            right: 30px;
            bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
        }

        .scroll-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #8b0000;
            color: white;
            border: none;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(139, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .scroll-btn:hover {
            background: #6d0000;
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(139, 0, 0, 0.4);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .gallery-title {
                font-size: 2.5rem;
            }

            .gallery-subtitle {
                font-size: 1rem;
            }

            .filter-container {
                padding: 15px;
                gap: 10px;
            }

            .filter-btn,
            .back-btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 20px;
            }

            .scroll-btn {
                width: 50px;
                height: 50px;
                font-size: 18px;
            }

            .lightbox-close {
                top: 20px;
                right: 20px;
                font-size: 40px;
            }

            .lightbox-arrow {
                font-size: 40px;
                padding: 10px;
            }

            .lightbox-arrow.left {
                left: 10px;
            }

            .lightbox-arrow.right {
                right: 10px;
            }
        }

        @media (max-width: 480px) {
            .gallery-container {
                padding: 30px 3%;
            }

            .gallery-title {
                font-size: 2rem;
            }

            .gallery-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .scroll-buttons {
                right: 15px;
                bottom: 15px;
            }
        }
    </style>

<body>
    <div class="gallery-container">
        <!-- Header -->
        <div class="gallery-header">
            <h1 class="gallery-title">Our Gallery</h1>
            <p class="gallery-subtitle">Explore memories from different years</p>
        </div>

        <!-- Filter Buttons -->
        <div class="filter-container">
            <!-- Dynamically generated by gallery-loader.js -->
            <a href="vimarsh2026.html" class="back-btn">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
        </div>

        <!-- Gallery Grid -->
        <div class="gallery-grid">
            <div class="gallery-loading">
                <div class="spinner"></div>
                <p>Loading gallery from Supabase Storage...</p>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox">
        <span class="lightbox-close">&times;</span>
        <span class="lightbox-arrow left">&#10094;</span>
        <img class="lightbox-content" src="" alt="Gallery Image">
        <span class="lightbox-arrow right">&#10095;</span>
    </div>

    <!-- Scroll Buttons -->
    <div class="scroll-buttons">
        <button class="scroll-btn" id="scrollTopBtn" aria-label="Scroll to top">
            <i class="fas fa-arrow-up"></i>
        </button>
        <button class="scroll-btn" id="scrollBottomBtn" aria-label="Scroll to bottom">
            <i class="fas fa-arrow-down"></i>
        </button>
    </div>

    <!-- Scripts -->
    <script src="supabase-gallery-config.js"></script>
    <script src="gallery-loader.js"></script>

    <script>
        // Scroll Button Logic
        const scrollTopBtn = document.getElementById("scrollTopBtn");
        const scrollBottomBtn = document.getElementById("scrollBottomBtn");

        function smoothScrollTo(targetY, duration = 800) {
            const startY = window.scrollY;
            const distanceY = targetY - startY;
            let startTime = null;

            function easeInOutCubic(t) {
                return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
            }

            function animation(currentTime) {
                if (startTime === null) startTime = currentTime;
                const timeElapsed = currentTime - startTime;
                const progress = Math.min(timeElapsed / duration, 1);
                const easedProgress = easeInOutCubic(progress);

                window.scrollTo(0, startY + distanceY * easedProgress);

                if (timeElapsed < duration) {
                    requestAnimationFrame(animation);
                }
            }

            requestAnimationFrame(animation);
        }

        scrollTopBtn.addEventListener("click", () => smoothScrollTo(0, 900));
        scrollBottomBtn.addEventListener("click", () => smoothScrollTo(document.body.scrollHeight, 900));

        window.addEventListener("scroll", () => {
            scrollTopBtn.style.display = window.scrollY > 200 ? "flex" : "none";
            scrollBottomBtn.style.display = (window.innerHeight + window.scrollY >= document.body.offsetHeight - 50) ? "none" : "flex";
        });

        scrollTopBtn.style.display = "none";
    </script>
</body>
