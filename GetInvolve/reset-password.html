    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg-base);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .reset-container {
            background: var(--bg-elevated);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--border-light);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-section img {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
        }

        .logo-section h1 {
            color: var(--text-primary);
            font-size: 28px;
            margin-bottom: 10px;
        }

        .logo-section p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 14px;
        }

        .password-input-wrapper {
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: 2px solid var(--border-light);
            border-radius: var(--radius-lg);
            font-size: 15px;
            transition: var(--transition-base);
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--saffron-primary);
            box-shadow: 0 0 0 3px var(--saffron-pale);
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
            transition: var(--transition-base);
        }

        .password-toggle:hover {
            color: var(--saffron-primary);
        }

        .password-requirements {
            background: var(--bg-subtle);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 15px;
            margin-top: 15px;
            font-size: 13px;
        }

        .password-requirements h4 {
            color: var(--text-primary);
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 600;
        }

        .requirement {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
            color: var(--text-secondary);
        }

        .requirement.met {
            color: var(--green-primary);
        }

        .requirement i {
            width: 16px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--gradient-saffron);
            color: var(--text-on-accent);
            border: 2px solid transparent;
            border-radius: var(--radius-full);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-base);
            margin-top: 10px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            opacity: 0.9;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            padding: 15px;
            border-radius: var(--radius-lg);
            margin: 15px 0;
            display: none;
            font-size: 14px;
        }

        .message.success {
            background: var(--green-pale);
            color: var(--green-dark);
            border: 1px solid var(--green-primary);
        }

        .message.error {
            background: var(--color-error-pale);
            color: var(--color-error);
            border: 1px solid var(--color-error);
        }

        .message.loading {
            background: var(--color-info-pale);
            color: var(--navy-chakra);
            border: 1px solid var(--navy-chakra);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .spinner {
            border: 3px solid var(--border-light);
            border-top: 3px solid var(--saffron-primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: var(--saffron-primary);
            text-decoration: none;
            font-size: 14px;
            transition: var(--transition-base);
        }

        .back-link a:hover {
            color: var(--saffron-dark);
            text-decoration: underline;
        }

                transition-duration: 0.01ms !important;

   ============================================ */
        @media print {
            body {
                background: white;
                padding: 0;
            }

            .reset-container {
                box-shadow: none;
                border: 1px solid #000;
                max-width: 100%;
            }

            .password-toggle,
            .btn {
                display: none;
            }

            .password-requirements {
                page-break-inside: avoid;
            }

            .message {
                border: 1px solid #000;
            }
        }

        /* ============================================
   DARK MODE ADJUSTMENTS
   ============================================ */
        @media (prefers-color-scheme: dark) {
            .reset-container {
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            }

            .form-group input:focus {
                box-shadow: 0 0 0 3px rgba(255, 153, 0, 0.25);
            }

            .message.loading {
                background: rgba(35, 71, 137, 0.2);
            }
        }

        /* ============================================
   CONTAINER QUERIES (Modern Browsers)
   ============================================ */
        @supports (container-type: inline-size) {
            .reset-container {
                container-type: inline-size;
                container-name: reset;
            }

            @container reset (max-width: 400px) {
                .logo-section h1 {
                    font-size: 20px;
                }

                .password-requirements {
                    font-size: 11px;
                }
            }

            @container reset (max-width: 350px) {
                .logo-section img {
                    width: 50px;
                    height: 50px;
                }

                .form-group input {
                    font-size: 13px;
                }
            }
        }
    </style>
    <meta name="msvalidate.01" content="762998E140200B5AFB94E40845B01499" />
</head>

<body>
    <div class="reset-container">
        <div class="logo-section">
            <img src="/Images/YUVA logo.png" alt="YUVA Logo">
            <h1>Reset Your Password</h1>
            <p>Choose a strong new password for your account</p>
        </div>

        <div id="message" class="message"></div>

        <form id="reset-form">
            <div class="form-group">
                <label for="new-password">New Password:</label>
                <div class="password-input-wrapper">
                    <input type="password" id="new-password" minlength="6" required autocomplete="new-password">
                    <button type="button" class="password-toggle" onclick="togglePassword('new-password', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password:</label>
                <div class="password-input-wrapper">
                    <input type="password" id="confirm-password" minlength="6" required autocomplete="new-password">
                    <button type="button" class="password-toggle" onclick="togglePassword('confirm-password', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="password-requirements">
                <h4>Password must contain:</h4>
                <div class="requirement" id="req-length">
                    <i class="fas fa-circle"></i>
                    <span>At least 6 characters</span>
                </div>
                <div class="requirement" id="req-match">
                    <i class="fas fa-circle"></i>
                    <span>Both passwords match</span>
                </div>
            </div>

            <button type="submit" class="btn" id="reset-btn">&#128274; Set New Password</button>
        </form>

        <div class="back-link">
            <a href="/GetInvolve/UnitRegistration.html">← Back to Login</a>
        </div>
    </div>

    <script>
        const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbz2uhTDSe7aaFZOkEoeXnM3DADG1ANjGob1sgx9U_ZKRehOvM8-OXHQhkkoYjK_PWTY/exec';

        console.log('[ResetPassword] Page loaded at', new Date().toISOString());
        console.log('[ResetPassword] Current URL:', window.location.href);

        // Get parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email');

        console.log('[ResetPassword] URL params - email:', email, '| token present:', !!token, '| token length:', token ? token.length : 0);

        // Validate URL parameters
        if (!token || !email) {
            console.error('[ResetPassword] Missing token or email in URL. Cannot proceed.');
            showMessage('Invalid reset link. Token or email is missing.', 'error');
            document.getElementById('reset-form').style.display = 'none';
        } else {
            console.log('[ResetPassword] Valid URL params - form is ready.');
        }

        // Password validation
        const newPasswordInput = document.getElementById('new-password');
        const confirmPasswordInput = document.getElementById('confirm-password');

        function validatePassword() {
            const password = newPasswordInput.value;
            const confirm = confirmPasswordInput.value;

            // Length requirement
            const lengthReq = document.getElementById('req-length');
            if (password.length >= 6) {
                lengthReq.classList.add('met');
                lengthReq.querySelector('i').className = 'fas fa-check-circle';
            } else {
                lengthReq.classList.remove('met');
                lengthReq.querySelector('i').className = 'fas fa-circle';
            }

            // Match requirement
            const matchReq = document.getElementById('req-match');
            if (password && confirm && password === confirm) {
                matchReq.classList.add('met');
                matchReq.querySelector('i').className = 'fas fa-check-circle';
            } else {
                matchReq.classList.remove('met');
                matchReq.querySelector('i').className = 'fas fa-circle';
            }
        }

        newPasswordInput.addEventListener('input', validatePassword);
        confirmPasswordInput.addEventListener('input', validatePassword);

        // Toggle password visibility
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('i');

            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        // Form submission
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            console.log('[ResetPassword] Submit button clicked');

            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            // Validation
            if (newPassword.length < 6) {
                console.warn('[ResetPassword] Validation failed: password too short');
                showMessage('Password must be at least 6 characters long.', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                console.warn('[ResetPassword] Validation failed: passwords do not match');
                showMessage('Passwords do not match.', 'error');
                return;
            }

            console.log('[ResetPassword] Validation passed. Submitting to GAS...');

            const btn = document.getElementById('reset-btn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Updating Password...';

            try {
                // Call GAS backend to verify token and update password via Supabase Auth Admin API
                // (supabaseClient.auth.updateUser() requires an active Auth session which
                //  does NOT exist when arriving via a custom password-reset email link)
                const params = new URLSearchParams({
                    action: 'auth',
                    method: 'resetPassword',
                    email: email,
                    token: token,
                    password: newPassword
                });

                const gasUrl = `${GAS_WEB_APP_URL}?${params.toString()}`;
                console.log('[ResetPassword] Calling GAS backend...');
                console.log('[ResetPassword] GAS URL (password masked):', gasUrl.replace(encodeURIComponent(newPassword), '***'));

                const response = await fetch(gasUrl);
                console.log('[ResetPassword] GAS HTTP status:', response.status, response.statusText);

                let result;
                try {
                    result = await response.json();
                    console.log('[ResetPassword] GAS response JSON:', JSON.stringify(result));
                } catch (jsonErr) {
                    const rawText = await response.text();
                    console.error('[ResetPassword] Failed to parse GAS response as JSON:', rawText);
                    throw new Error('Invalid response from server: ' + rawText.substring(0, 200));
                }

                if (!result.success) {
                    const errMsg = result.error || 'Password reset failed. Please try again.';
                    console.error('[ResetPassword] GAS returned error:', errMsg);
                    showMessage('Error: ' + errMsg, 'error');
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                    return;
                }

                // Success!
                console.log('[ResetPassword] Password reset successful! Redirecting...');
                showMessage('Password reset successful! Redirecting to login...', 'success');

                setTimeout(() => {
                    window.location.href = '/GetInvolve/UnitRegistration.html';
                }, 2000);

            } catch (error) {
                console.error('[ResetPassword] Unexpected error during reset:', error);
                showMessage('An error occurred: ' + error.message + '. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        function showMessage(text, type) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = text;
            msgEl.className = `message ${type}`;
            msgEl.style.display = 'block';

            if (type === 'success' || type === 'error') {
                setTimeout(() => {
                    msgEl.style.display = 'none';
                }, 5000);
            }
        }
    </script>
</body>

</html>
