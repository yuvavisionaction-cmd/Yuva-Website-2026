<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUVA Video Manager</title>
    <link rel="stylesheet" href="media-styles.css">
    <link rel="shortcut icon" href="/Images/YUVA logo.png" type="image/x-icon">

    <!-- Modern Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        /* ===== THEME VARIABLES (India Theme) ===== */
        :root {
            /* India Theme Color Palette */
            --saffron-primary: #FF9933;
            --saffron-light: #FFB366;
            --saffron-dark: #E67300;
            --saffron-pale: #FFE5CC;
            --white-primary: #FFFFFF;
            --white-warm: #FAFAF9;
            --white-cream: #F5F5F4;
            --green-primary: #138808;
            --green-light: #22C55E;
            --green-dark: #0F6606;
            --green-pale: #D1FAE5;
            --navy-chakra: #000080;
            --navy-dark: #00005C;

            /* Semantic Colors */
            --color-primary: var(--navy-chakra);
            --color-secondary: var(--green-primary);
            --color-accent: var(--saffron-primary);
            --color-error: #ef4444;
            --color-error-pale: #fef2f2;
            --color-success: var(--green-primary);
            --color-info-pale: #EBF4FF;

            /* Text & Background */
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --text-muted: #64748B;
            --text-on-dark: var(--white-primary);
            --text-on-accent: var(--white-primary);
            --bg-base: var(--white-warm);
            --bg-elevated: var(--white-primary);
            --bg-subtle: var(--white-cream);
            --bg-muted: #F1F5F9;
            --border-light: #E2E8F0;
            --border-medium: #CBD5E1;
            --gray-50: #F8FAFC;
            --gray-100: #F1F5F9;
            --gray-200: #E2E8F0;
            --gray-300: #CBD5E1;
            --gray-700: #334155;
            --gray-800: #1E293B;

            /* Gradients */
            --gradient-hero: linear-gradient(135deg, var(--saffron-light) 0%, var(--white-primary) 50%, var(--green-light) 100%);
            --gradient-saffron: linear-gradient(135deg, var(--saffron-primary) 0%, var(--saffron-dark) 100%);
            --gradient-green: linear-gradient(135deg, var(--green-light) 0%, var(--green-primary) 100%);
            --gradient-navy: linear-gradient(135deg, var(--navy-chakra) 0%, var(--navy-dark) 100%);
            --gradient-shell: radial-gradient(circle at 10% 10%, rgba(255, 153, 51, 0.12), transparent 32%), radial-gradient(circle at 90% 15%, rgba(19, 136, 8, 0.12), transparent 34%), linear-gradient(180deg, #f8fafc 0%, #ffffff 45%, #f8fafc 100%);

            /* Shadows & Radii */
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;

            /* Transitions */
            --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ===== GLOBAL LAYOUT ===== */
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--gradient-shell);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        .video-manager {
            max-width: 1280px;
            margin: 0 auto;
            padding: clamp(36px, 5vw, 64px) clamp(14px, 3vw, 24px);
        }

        .manager-header {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(203, 213, 225, 0.65);
            box-shadow: 0 14px 28px -22px rgba(15, 23, 42, 0.65);
            border-radius: 22px;
            backdrop-filter: blur(6px);
            padding: 24px 18px 20px;
        }

        .manager-title {
            font-size: clamp(2rem, 4vw, 2.9rem);
            font-weight: 800;
            font-family: 'Poppins', sans-serif;
            color: var(--text-primary);
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .manager-title i {
            color: var(--color-accent);
            margin-right: 12px;
        }

        .manager-subtitle {
            font-size: clamp(0.95rem, 1.5vw, 1.1rem);
            color: var(--text-secondary);
            margin-bottom: 32px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        #sourceBar {
            margin-top: 6px;
            padding: 10px;
            border-radius: 14px;
            background: rgba(241, 245, 249, 0.7);
            border: 1px solid var(--gray-200);
        }

        #sourceBar .btn.btn-secondary.btn-small {
            background: var(--white-primary);
            border: 1px solid var(--gray-300);
            min-width: 108px;
        }

        #sourceBar .btn.btn-secondary.btn-small:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
            background: #eef3ff;
        }

        /* ===== GRID & CARDS ===== */
        .manager-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(410px, 1fr));
            gap: 32px;
            margin-bottom: 40px;
        }

        .manager-card {
            background: var(--bg-elevated);
            border-radius: var(--radius-2xl);
            padding: 32px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-light);
            position: relative;
            overflow: hidden;
            transition: var(--transition-base);
        }

        .manager-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-xl);
            border-color: var(--border-medium);
        }

        /* Decorative top border for cards */
        .manager-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-navy);
        }

        /* Alternate card accent colors */
        .manager-card:nth-child(2)::before {
            background: var(--gradient-saffron);
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-light);
        }

        .card-title i {
            color: var(--color-primary);
            background: var(--color-info-pale);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 1.25rem;
        }

        /* ===== FORMS ===== */
        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid var(--border-light);
            border-radius: var(--radius-lg);
            font-size: 1rem;
            line-height: 1.35;
            min-height: 56px;
            background: var(--bg-subtle);
            color: var(--text-primary);
            transition: var(--transition-base);
            font-family: inherit;
        }

        .form-select {
            padding-right: 44px;
        }

        .form-input::placeholder,
        .form-select::placeholder {
            color: var(--text-muted);
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--color-primary);
            background: var(--bg-elevated);
            box-shadow: 0 0 0 4px var(--color-info-pale);
        }

        textarea.form-input {
            resize: vertical;
            min-height: 160px;
            line-height: 1.55;
        }

        /* ===== BUTTONS ===== */
        .btn {
            background: var(--gradient-navy);
            color: var(--text-on-dark);
            border: none;
            padding: 14px 28px;
            border-radius: var(--radius-lg);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-base);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1rem;
            width: 100%;
            box-shadow: var(--shadow-md);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--border-medium);
            box-shadow: var(--shadow-sm);
            width: auto;
            /* Allow auto width for secondary buttons */
        }

        .btn-secondary:hover {
            background: var(--bg-muted);
            border-color: var(--text-secondary);
            color: var(--text-primary);
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 0.875rem;
            border-radius: 6px;
        }

        /* ===== VIDEO PREVIEW ===== */
        .video-preview {
            margin-top: 24px;
            padding: 20px;
            background: var(--bg-subtle);
            border-radius: var(--radius-xl);
            border: 2px dashed var(--border-medium);
            text-align: center;
        }

        .video-preview img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: var(--radius-lg);
            margin-bottom: 16px;
            box-shadow: var(--shadow-md);
        }

        .video-info {
            text-align: left;
        }

        .video-info .video-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .video-info .video-meta {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        /* ===== CURRENT VIDEOS LIST ===== */
        .current-videos {
            grid-column: 1 / -1;
        }

        .video-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-top: 24px;
        }

        .video-item {
            background: var(--bg-subtle);
            border-radius: var(--radius-xl);
            padding: 20px;
            border: 1px solid var(--border-light);
            transition: var(--transition-base);
            position: relative;
        }

        .video-thumb-wrap {
            width: 100%;
            margin-bottom: 12px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-light);
            background: var(--gray-100);
        }

        .video-thumb {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            display: block;
        }

        .video-item:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--border-medium);
            background: var(--bg-elevated);
        }

        .video-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-light);
        }

        .video-id {
            font-family: 'Courier New', monospace;
            background: var(--navy-dark);
            color: var(--white-primary);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        .video-category {
            background: var(--saffron-pale);
            color: var(--saffron-dark);
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .video-item .video-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            font-size: 1rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .video-actions button {
            flex: 1;
            justify-content: center;
        }

        .video-actions .btn-secondary {
            background: var(--white-primary);
        }

        .video-actions .btn-secondary:hover {
            background: var(--color-error-pale);
            color: var(--color-error);
            border-color: var(--color-error);
        }

        .video-actions button:last-child:hover {
            background: var(--color-info-pale);
            color: var(--color-primary);
            border-color: var(--color-primary);
        }

        /* ===== NOTIFICATIONS ===== */
        .success-message,
        .error-message {
            padding: 16px;
            border-radius: var(--radius-lg);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            animation: fadeIn 0.3s ease-out;
        }

        .success-message {
            background: var(--green-pale);
            color: var(--green-dark);
            border: 1px solid var(--green-light);
        }

        .error-message {
            background: var(--color-error-pale);
            color: var(--color-error);
            border: 1px solid var(--color-error);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== SYNC SPINNER ===== */
        @keyframes vm-spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .is-syncing i {
            animation: vm-spin 1s linear infinite;
        }

        .is-syncing {
            opacity: 0.7;
            pointer-events: none;
            background: var(--bg-muted) !important;
        }

        /* ================================================================ */
        /* ===== RESPONSIVE MEDIA QUERIES FOR VIDEO MANAGER ===== */
        /* ================================================================ */
        /* Add these to your existing style block */

        /* ===== TABLET - 768px and below ===== */
        @media (max-width: 768px) {

            /* Container adjustments */
            .video-manager {
                padding: 40px 16px;
            }

            /* Header */
            .manager-header {
                margin-bottom: 40px;
            }

            .manager-title {
                font-size: 2.25rem;
                margin-bottom: 10px;
            }

            .manager-title i {
                margin-right: 10px;
                font-size: 2rem;
            }

            .manager-subtitle {
                font-size: 1rem;
                margin-bottom: 28px;
                padding: 0 10px;
            }

            .manager-header {
                border-radius: 18px;
                padding: 18px 12px 14px;
            }

            #sourceBar {
                justify-content: stretch !important;
                gap: 10px !important;
                padding: 10px 8px;
            }

            #sourceBar .video-category {
                width: 100%;
                text-align: center;
                justify-content: center;
            }

            #sourceBar .btn.btn-secondary.btn-small {
                flex: 1 1 48%;
                min-width: 0;
            }

            /* Grid adjustments */
            .manager-grid {
                grid-template-columns: 1fr;
                gap: 24px;
                margin-bottom: 32px;
            }

            /* Cards */
            .manager-card {
                padding: 28px 24px;
                border-radius: var(--radius-xl);
            }

            .manager-card::before {
                height: 3px;
            }

            .card-title {
                font-size: 1.35rem;
                margin-bottom: 20px;
                padding-bottom: 14px;
                gap: 10px;
            }

            .card-title i {
                width: 38px;
                height: 38px;
                font-size: 1.15rem;
            }

            /* Form elements */
            .form-group {
                margin-bottom: 20px;
            }

            .form-label {
                font-size: 0.9rem;
                margin-bottom: 7px;
            }

            .form-input,
            .form-select {
                padding: 14px 16px;
                font-size: 0.95rem;
                min-height: 52px;
            }

            textarea.form-input {
                min-height: 140px;
            }

            /* Buttons */
            .btn {
                padding: 13px 24px;
                font-size: 0.95rem;
                gap: 8px;
            }

            .btn-small {
                padding: 7px 14px;
                font-size: 0.8rem;
            }

            /* Video preview */
            .video-preview {
                margin-top: 20px;
                padding: 18px;
            }

            .video-preview img {
                height: 200px;
                margin-bottom: 14px;
            }

            .video-info .video-title {
                font-size: 1rem;
                margin-bottom: 7px;
            }

            .video-info .video-meta {
                font-size: 0.85rem;
                grid-template-columns: 1fr;
                gap: 6px;
            }

            /* Video list */
            .video-list {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 20px;
                margin-top: 20px;
            }

            .video-item {
                padding: 18px;
            }

            .video-item-header {
                margin-bottom: 10px;
                padding-bottom: 10px;
            }

            .video-id {
                font-size: 10px;
                padding: 3px 7px;
            }

            .video-category {
                font-size: 10px;
                padding: 3px 9px;
            }

            .video-item .video-title {
                font-size: 0.95rem;
                margin-bottom: 10px;
            }

            .video-actions {
                gap: 8px;
                margin-top: 14px;
            }

            /* Notifications */
            .success-message,
            .error-message {
                padding: 14px;
                gap: 10px;
                font-size: 0.9rem;
                margin-bottom: 20px;
            }
        }

        /* ===== MOBILE - 480px and below ===== */
        @media (max-width: 480px) {

            /* Container */
            .video-manager {
                padding: 30px 12px;
            }

            /* Header */
            .manager-header {
                margin-bottom: 32px;
            }

            .manager-title {
                font-size: 1.85rem;
                margin-bottom: 8px;
                letter-spacing: -0.01em;
            }

            .manager-title i {
                margin-right: 8px;
                font-size: 1.75rem;
            }

            .manager-subtitle {
                font-size: 0.9rem;
                margin-bottom: 24px;
                padding: 0 8px;
                line-height: 1.5;
            }

            .manager-header {
                padding: 16px 10px 12px;
            }

            #sourceBar {
                border-radius: 12px;
                padding: 8px 6px;
            }

            #sourceBar .btn.btn-secondary.btn-small {
                flex: 1 1 100%;
                width: 100%;
            }

            /* Grid */
            .manager-grid {
                gap: 20px;
                margin-bottom: 28px;
            }

            /* Cards */
            .manager-card {
                padding: 24px 20px;
                border-radius: var(--radius-lg);
            }

            .card-title {
                font-size: 1.2rem;
                margin-bottom: 18px;
                padding-bottom: 12px;
                gap: 8px;
                flex-wrap: wrap;
            }

            .card-title i {
                width: 36px;
                height: 36px;
                font-size: 1.1rem;
            }

            /* Form elements */
            .form-group {
                margin-bottom: 18px;
            }

            .form-label {
                font-size: 0.85rem;
                margin-bottom: 6px;
            }

            .form-input,
            .form-select {
                padding: 13px 14px;
                font-size: 0.9rem;
                border-radius: 10px;
                min-height: 48px;
            }

            .form-input:focus,
            .form-select:focus {
                box-shadow: 0 0 0 3px var(--color-info-pale);
            }

            textarea.form-input {
                min-height: 120px;
            }

            /* Buttons */
            .btn {
                padding: 12px 20px;
                font-size: 0.9rem;
                gap: 7px;
            }

            .btn-small {
                padding: 6px 12px;
                font-size: 0.75rem;
            }

            /* Video preview */
            .video-preview {
                margin-top: 18px;
                padding: 16px;
            }

            .video-preview img {
                height: 180px;
                margin-bottom: 12px;
            }

            .video-info .video-title {
                font-size: 0.95rem;
                margin-bottom: 6px;
            }

            .video-info .video-meta {
                font-size: 0.8rem;
            }

            /* Video list */
            .video-list {
                grid-template-columns: 1fr;
                gap: 16px;
                margin-top: 18px;
            }

            .video-item {
                padding: 16px;
            }

            .video-item-header {
                flex-wrap: wrap;
                gap: 8px;
                margin-bottom: 10px;
                padding-bottom: 10px;
            }

            .video-id {
                font-size: 9px;
                padding: 3px 6px;
            }

            .video-category {
                font-size: 9px;
                padding: 3px 8px;
            }

            .video-item .video-title {
                font-size: 0.9rem;
                margin-bottom: 10px;
                line-height: 1.3;
            }

            .video-actions {
                flex-direction: column;
                gap: 10px;
                margin-top: 12px;
            }

            .video-actions button {
                width: 100%;
            }

            /* Notifications */
            .success-message,
            .error-message {
                padding: 12px;
                gap: 8px;
                font-size: 0.85rem;
                margin-bottom: 18px;
                border-radius: 10px;
            }

            .success-message i,
            .error-message i {
                font-size: 1rem;
            }
        }

        /* ===== EXTRA SMALL MOBILE - 375px and below ===== */
        @media (max-width: 375px) {

            /* Container */
            .video-manager {
                padding: 24px 10px;
            }

            /* Header */
            .manager-header {
                margin-bottom: 28px;
            }

            .manager-title {
                font-size: 1.65rem;
                margin-bottom: 6px;
            }

            .manager-title i {
                margin-right: 6px;
                font-size: 1.5rem;
            }

            .manager-subtitle {
                font-size: 0.85rem;
                margin-bottom: 20px;
                padding: 0 5px;
            }

            /* Grid */
            .manager-grid {
                gap: 16px;
                margin-bottom: 24px;
            }

            /* Cards */
            .manager-card {
                padding: 20px 16px;
            }

            .card-title {
                font-size: 1.1rem;
                margin-bottom: 16px;
                padding-bottom: 10px;
            }

            .card-title i {
                width: 34px;
                height: 34px;
                font-size: 1rem;
            }

        /* ===== LANDSCAPE MODE (Mobile/Tablet) ===== */
        @media (max-height: 600px) and (orientation: landscape) {

            /* Reduce vertical spacing in landscape */

        /* ===== VERY LARGE SCREENS - 1920px and above ===== */
        @media (min-width: 1920px) {

            /* Prevent elements from becoming too large */
            .video-manager {
                max-width: 1400px;
                padding: 80px 20px;

            .manager-title {

                padding: 16px 32px;
                font-size: 1.05rem;
            }

            .video-preview img {
                height: 260px;

            .video-list {
                grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
                gap: 28px;

        /* ===== TOUCH DEVICE OPTIMIZATIONS ===== */
        @media (hover: none) and (pointer: coarse) {

            /* Increase touch targets */
            .btn {
                min-height: 48px;
                padding: 14px 24px;

            .btn-small {
                min-height: 40px;

            /* Remove hover effects on touch devices */

                filter: none;

            .video-item:hover {
                transform: none;
            }

            .manager-card:hover {

            /* Active states are more important than hover on touch */
            .btn:active {
                transform: scale(0.97);
                opacity: 0.9;
            }

            .video-item:active {

        /* ===== PRINT STYLES ===== */
        @media print {

            body {

            .video-manager {

        /* ===== HIGH CONTRAST MODE ===== */
        @media (prefers-contrast: high) {

            .manager-card,
            .video-item,
            .video-preview {
                border: 2px solid currentColor;
            }

            .form-input,
            .form-select {
                border-width: 2px;
            }

            .btn {
                border: 2px solid currentColor;
            }

            .video-id,
            .video-category {
                border: 1px solid currentColor;
            }
        }

        /* ===== REDUCED MOTION ===== */
        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;

            .manager-card,
            .video-item,
            .btn,
            .form-input,
            .form-select {

            .error-message {
                animation: none !important;
            }

            @keyframes vm-spin {

                from,
                to {
                    transform: rotate(0deg);
                }
            }
        }

    <!-- Flash Notification Container -->
    <div id="flash-container" class="flash-container"></div>

    <script src="media-script.js"></script>
    <script>
        // Video Manager JavaScript
        let currentVideos = [];
        const YOUTUBE_CONFIG = {
            API_KEY: 'AIzaSyC_-iClHMdTb1TRLNtyEDFt7yHa6PZNj7M',
            API_URL: 'https://www.googleapis.com/youtube/v3/videos',
            CHANNEL_ID: 'UCouikXeZNp7TgoCfBveZqMA'
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', function () {
            setupEventListeners();
            loadVideosFromSupabase();

            // Initialize year filters based on default selections
            toggleYearFilter();
            toggleBulkYearFilter();
        });

        function setupEventListeners() {
            document.getElementById('fetchVideoBtn').addEventListener('click', fetchVideoDetails);
            document.getElementById('addVideoForm').addEventListener('submit', addVideo);
            document.getElementById('bulkAddBtn').addEventListener('click', bulkAddVideos);
            document.getElementById('syncBtn').addEventListener('click', syncData);
        }

        async function syncData() {
            const btn = document.getElementById('syncBtn');
            const originalHtml = btn.innerHTML;
            btn.classList.add('is-syncing');
            btn.innerHTML = '<i class="fas fa-rotate"></i> Syncing...';

            try {
                await loadVideosFromSupabase();
                // Notify video page to refresh (both tabs/windows)
                try { localStorage.setItem('media_sync_trigger', String(Date.now())); } catch (e) { }
                showFlashMessage('success', 'Synced', 'Video page notified to refresh videos.');
            } finally {
                btn.classList.remove('is-syncing');
                btn.innerHTML = originalHtml;
            }
        }

        // Toggle year filter for single video
        function toggleYearFilter() {
            const category = document.getElementById('videoCategory').value;
            const yearGroup = document.getElementById('yearGroup');

            if (category === 'vimarsh') {
                yearGroup.style.display = 'block';
            } else {
                yearGroup.style.display = 'none';
            }
        }

        // Toggle year filter for bulk videos
        function toggleBulkYearFilter() {
            const category = document.getElementById('bulkCategory').value;
            const yearGroup = document.getElementById('bulkYearGroup');

            if (category === 'vimarsh') {
                yearGroup.style.display = 'block';
            } else {
                yearGroup.style.display = 'none';
            }
        }

        // Make toggleYearFilter globally accessible for HTML onchange
        window.toggleYearFilter = toggleYearFilter;
        window.toggleBulkYearFilter = toggleBulkYearFilter;

        // Load video details from YouTube API
        async function loadVideoDetails() {
            if (!YOUTUBE_CONFIG || !YOUTUBE_CONFIG.API_KEY) {
                console.error('YouTube API key not configured');
                return;
            }

            const videoIds = currentVideos.map(video => video.id).join(',');
            if (!videoIds) return;

            try {
                const response = await fetch(
                    `${YOUTUBE_CONFIG.API_URL}?part=snippet,statistics,contentDetails&id=${videoIds}&key=${YOUTUBE_CONFIG.API_KEY}`
                );

                if (!response.ok) {
                    throw new Error(`YouTube API error: ${response.status}`);
                }

                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    // Update current videos with fetched data (do not auto-set year)
                    data.items.forEach(apiVideo => {
                        const videoIndex = currentVideos.findIndex(v => v.id === apiVideo.id);
                        if (videoIndex !== -1) {
                            currentVideos[videoIndex] = {
                                ...currentVideos[videoIndex],
                                title: apiVideo.snippet.title,
                                description: apiVideo.snippet.description,
                                publishedAt: apiVideo.snippet.publishedAt,
                                viewCount: apiVideo.statistics?.viewCount || 'N/A',
                                duration: apiVideo.contentDetails?.duration || 'N/A',
                                thumbnail: apiVideo.snippet.thumbnails.medium?.url || apiVideo.snippet.thumbnails.default?.url
                            };
                        }
                    });

                    // Reload the display
                    loadCurrentVideos();
                }

            } catch (error) {
                console.error('Error loading video details:', error);
                showError('Failed to load video details from YouTube API');
            }
        }

        async function fetchVideoDetails() {
            const videoUrl = document.getElementById('videoUrl').value.trim();
            const category = document.getElementById('videoCategory').value;

            if (!videoUrl) {
                showError('Please enter a YouTube URL or Video ID');
                return;
            }

            if (!category) {
                showError('Please select a category');
                return;
            }

            const videoId = extractVideoId(videoUrl);
            if (!videoId) {
                showError('Invalid YouTube URL format');
                return;
            }

            try {
                const video = await fetchYouTubeVideoById(videoId);
                if (!video) {
                    showError('Video not found or not accessible');
                    return;
                }

                // For Vimarsh videos, show year selection (do not auto-set)
                if (category === 'vimarsh') {
                    document.getElementById('yearGroup').style.display = 'block';
                }

                showVideoPreview(video.raw, category);
            } catch (error) {
                console.error('Error fetching video:', error);
                showError('Failed to fetch video details. Please check your API key.');
            }
        }

        function hasIncompleteVideoData(video) {
            if (!video) return true;
            const badTitle = !video.title || video.title === 'Loading...';
            const badDescription = !video.description || video.description === 'Loading...';
            const badThumbnail = !video.thumbnail;
            const normalizedDuration = normalizeDurationValue(video.duration);
            const badDuration = !normalizedDuration || String(video.duration || '').startsWith('PT');
            const badPublishedAt = !video.publishedAt;
            return badTitle || badDescription || badThumbnail || badDuration || badPublishedAt;
        }

        async function fetchYouTubeVideoById(videoId) {
            const response = await fetch(
                `${YOUTUBE_CONFIG.API_URL}?part=snippet,statistics,contentDetails&id=${videoId}&key=${YOUTUBE_CONFIG.API_KEY}`
            );

            if (!response.ok) {
                throw new Error(`YouTube API error: ${response.status}`);
            }

            const data = await response.json();
            if (!data.items || !data.items.length) return null;

            const item = data.items[0];
            return {
                raw: item,
                mapped: {
                    id: item.id,
                    title: item.snippet?.title || `Video ${item.id}`,
                    description: item.snippet?.description || 'No description available',
                    publishedAt: item.snippet?.publishedAt || new Date().toISOString(),
                    viewCount: item.statistics?.viewCount || null,
                    duration: normalizeDurationValue(item.contentDetails?.duration),
                    thumbnail: item.snippet?.thumbnails?.medium?.url || item.snippet?.thumbnails?.default?.url || null
                }
            };
        }

        function extractVideoId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/,
                /^([a-zA-Z0-9_-]{11})$/
            ];

            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }

            return null;
        }

        function showVideoPreview(video, category) {
            const preview = document.getElementById('videoPreview');
            const content = document.getElementById('previewContent');

            const thumbnail = video.snippet.thumbnails.medium?.url || video.snippet.thumbnails.default?.url;
            const publishedDate = new Date(video.snippet.publishedAt).toLocaleDateString();
            const viewCount = formatNumber(video.statistics.viewCount);
            const duration = formatDuration(video.contentDetails.duration);

            content.innerHTML = `
                <img src="${thumbnail}" alt="${video.snippet.title}">
                <div class="video-info">
                    <div class="video-title">${video.snippet.title}</div>
                    <div class="video-meta">
                        <div><strong>Category:</strong> ${category}</div>
                        <div><strong>Views:</strong> ${viewCount}</div>
                        <div><strong>Duration:</strong> ${duration}</div>
                        <div><strong>Published:</strong> ${publishedDate}</div>
                    </div>
                </div>
            `;

            preview.style.display = 'block';
        }

        async function addVideo(e) {
            e.preventDefault();

            const videoUrl = document.getElementById('videoUrl').value.trim();
            const category = document.getElementById('videoCategory').value;
            const year = document.getElementById('videoYear').value;

            if (!category) {
                showError('Please select a category');
                return;
            }

            const videoId = extractVideoId(videoUrl);
            if (!videoId) {
                showError('Invalid video ID');
                return;
            }

            // Check if video already exists
            if (currentVideos.find(v => v.id === videoId)) {
                showError('This video is already in the list');
                return;
            }

            let newVideo = {
                id: videoId,
                category: category,
                title: '',
                description: '',
                publishedAt: new Date().toISOString()
            };

            // Add year if it's a Vimarsh video (auto-fetched or manually selected)
            if (category === 'vimarsh' && year) {
                newVideo.year = year;
            }

            try {
                const yt = await fetchYouTubeVideoById(videoId);
                if (!yt) {
                    showError('Could not fetch video details from YouTube. Video not saved.');
                    return;
                }
                newVideo = { ...newVideo, ...yt.mapped };
            } catch (err) {
                console.error('YouTube enrichment failed:', err);
                showError('YouTube details fetch failed. Please try again.');
                return;
            }

            const savedToSupabase = await saveVideoToSupabase(newVideo);
            if (savedToSupabase) {
                showSuccess('Video added to Supabase!');
                await loadVideosFromSupabase();
            } else {
                showError('Failed to save to Supabase.');
            }

            // Reset form
            document.getElementById('addVideoForm').reset();
            document.getElementById('videoPreview').style.display = 'none';
            document.getElementById('yearGroup').style.display = 'none';
        }

        async function bulkAddVideos() {
            const urls = document.getElementById('bulkUrls').value.trim().split('\n');
            const category = document.getElementById('bulkCategory').value;
            const year = document.getElementById('bulkYear').value;

            if (!category) {
                showError('Please select a category');
                return;
            }

            if (urls.length === 0 || (urls.length === 1 && urls[0] === '')) {
                showError('Please enter at least one YouTube URL');
                return;
            }

            // Show progress UI
            const bulkBtn = document.getElementById('bulkAddBtn');
            const originalBtnText = bulkBtn.innerHTML;
            bulkBtn.disabled = true;
            bulkBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

            let processedCount = 0;
            let addedCount = 0;
            let errorCount = 0;
            let duplicateCount = 0;
            const videoIds = [];
            const errors = [];

            try {
                // Step 1: Validate URLs and collect video IDs
                showFlashMessage('info', 'Processing', 'Validating URLs and checking for duplicates...', 2000);

                for (const url of urls) {
                    const trimmedUrl = url.trim();
                    if (!trimmedUrl) continue;

                    processedCount++;
                    const videoId = extractVideoId(trimmedUrl);
                    if (!videoId) {
                        errorCount++;
                        errors.push(`Invalid URL: ${trimmedUrl}`);
                        continue;
                    }

                    // Check if video already exists
                    if (currentVideos.find(v => v.id === videoId)) {
                        duplicateCount++;
                        errors.push(`Duplicate video: ${videoId}`);
                        continue;
                    }

                    videoIds.push(videoId);
                }

                // Step 2: Fetch video details from YouTube API
                if (videoIds.length > 0) {
                    showFlashMessage('info', 'Processing', `Fetching details for ${videoIds.length} videos from YouTube...`, 2000);

                    try {
                        const response = await fetch(
                            `${YOUTUBE_CONFIG.API_URL}?part=snippet,statistics,contentDetails&id=${videoIds.join(',')}&key=${YOUTUBE_CONFIG.API_KEY}`
                        );

                        if (response.ok) {
                            const data = await response.json();

                            if (data.items && data.items.length > 0) {
                                data.items.forEach(apiVideo => {
                                    const newVideo = {
                                        id: apiVideo.id,
                                        category: category,
                                        title: apiVideo.snippet.title,
                                        description: apiVideo.snippet.description,
                                        publishedAt: apiVideo.snippet.publishedAt,
                                        viewCount: apiVideo.statistics?.viewCount || 'N/A',
                                        duration: normalizeDurationValue(apiVideo.contentDetails?.duration) || 'N/A',
                                        thumbnail: apiVideo.snippet.thumbnails.medium?.url || apiVideo.snippet.thumbnails.default?.url
                                    };

                                    // Year handling: use selected year for Vimarsh, do not auto from publish date
                                    if (category === 'vimarsh' && year) {
                                        newVideo.year = year;
                                    }

                                    currentVideos.push(newVideo);
                                    addedCount++;
                                });
                            }
                        }
                    } catch (error) {
                        console.error('Error fetching bulk video details:', error);
                        // Skip saving placeholders when YouTube API fetch fails
                        videoIds.forEach(videoId => {
                            errors.push(`Skipped (YouTube details unavailable): ${videoId}`);
                        });
                    }
                }

                // Step 3: Save to Supabase
                if (addedCount > 0) {
                    showFlashMessage('info', 'Processing', `Saving ${addedCount} videos to Supabase...`, 2000);

                    let savedToSheets = 0;
                    let saveErrors = 0;

                    // Save each video individually with progress feedback
                    for (let i = currentVideos.length - addedCount; i < currentVideos.length; i++) {
                        const video = currentVideos[i];
                        try {
                            const saved = await saveVideoToSupabase(video);
                            if (saved) {
                                savedToSheets++;
                            } else {
                                saveErrors++;
                                errors.push(`Failed to save: ${video.title}`);
                            }
                        } catch (error) {
                            saveErrors++;
                            errors.push(`Error saving ${video.title}: ${error.message}`);
                        }
                    }

                    // Show detailed results
                    if (savedToSheets === addedCount) {
                        showSuccess(`✅ All ${addedCount} videos saved to Supabase!`);
                    } else if (savedToSheets > 0) {
                        showFlashMessage('warning', 'Partial Success',
                            `✅ ${savedToSheets}/${addedCount} videos saved to Supabase. ${saveErrors} failed. Check table/RLS configuration.`, 5000);
                    } else {
                        showError(`❌ No videos saved to Supabase. Check table/RLS configuration.`);
                    }

                    // Reload from Supabase to keep view clean
                    await loadVideosFromSupabase();
                } else {
                    showError('❌ No valid videos were added');
                }

                // Show summary of all issues
                if (errors.length > 0) {
                    const errorSummary = errors.slice(0, 5).join('\n');
                    const moreErrors = errors.length > 5 ? `\n... and ${errors.length - 5} more errors` : '';
                    showFlashMessage('warning', 'Issues Found',
                        `Processed ${processedCount} URLs:\n• ${addedCount} added\n• ${duplicateCount} duplicates\n• ${errorCount} invalid URLs\n\nDetails:\n${errorSummary}${moreErrors}`, 8000);
                }

            } finally {
                // Reset button
                bulkBtn.disabled = false;
                bulkBtn.innerHTML = originalBtnText;

                // Reset form
                document.getElementById('bulkUrls').value = '';
                document.getElementById('bulkYearGroup').style.display = 'none';
            }
        }

        function loadCurrentVideos() {
            const container = document.getElementById('currentVideosList');
            container.innerHTML = '';

            currentVideos.forEach((video, index) => {
                const videoItem = document.createElement('div');
                videoItem.className = 'video-item';

                // Format view count and duration
                const viewCount = formatNumber(video.viewCount);
                const duration = video.duration ? formatDuration(video.duration) : 'N/A';
                const publishedDate = video.publishedAt ? new Date(video.publishedAt).toLocaleDateString() : 'N/A';
                const yearInfo = video.year ? ` | Year: ${video.year}` : '';
                const thumbnail = video.thumbnail || `https://img.youtube.com/vi/${video.id}/mqdefault.jpg`;

                videoItem.innerHTML = `
                    <div class="video-item-header">
                        <span class="video-id">${video.id}</span>
                        <span class="video-category">${video.category.toUpperCase()}${video.year ? ` ${video.year}` : ''}</span>
                    </div>
                    <div class="video-thumb-wrap">
                        <img class="video-thumb" src="${thumbnail}" alt="${video.title}">
                    </div>
                    <div class="video-title">${video.title}</div>
                    <div class="video-meta">
                        <div><strong>Category:</strong> ${video.category}${yearInfo}</div>
                        <div><strong>Views:</strong> ${viewCount}</div>
                        <div><strong>Duration:</strong> ${duration}</div>
                        <div><strong>Published:</strong> ${publishedDate}</div>
                    </div>
                    <div class="video-actions">
                        <button class="btn btn-small btn-secondary" onclick="removeVideo(${index})">
                            <i class="fas fa-trash"></i>
                            Remove
                        </button>
                        <button class="btn btn-small" onclick="copyVideoId('${video.id}')">
                            <i class="fas fa-copy"></i>
                            Copy ID
                        </button>
                    </div>
                `;
                container.appendChild(videoItem);
            });
        }

        async function removeVideo(index) {
            if (confirm('Are you sure you want to remove this video?')) {
                const videoToRemove = currentVideos[index];
                currentVideos.splice(index, 1);

                const deletedFromRemote = await deleteVideoFromSupabase(videoToRemove.id);

                if (deletedFromRemote) {
                    showSuccess('Video removed from Supabase!');
                } else {
                    showError('Failed to remove video from Supabase.');
                }

                loadCurrentVideos();
            }
        }

        function copyVideoId(videoId) {
            navigator.clipboard.writeText(videoId).then(() => {
                showSuccess('Video ID copied to clipboard!');
            });
        }

        // Update source/status badges in header
        function updateSourceBar(source, count) {
            const sourceEl = document.getElementById('dataSourceBadge');
            const countEl = document.getElementById('videoCountBadge');
            if (sourceEl) sourceEl.textContent = `Source: ${source}`;
            if (countEl) countEl.textContent = `Videos: ${count}`;
        }

        // Supabase REST configuration
        const VM_SUPABASE_URL = 'https://jgsrsjwmywiirtibofth.supabase.co';
        const VM_SUPABASE_ANON_KEY = 'sb_publishable_5KtvO0cEHfnECBoyp2CQnw_RC3_x2me';
        const VM_SUPABASE_VIDEO_TABLE = 'media_videos';

        async function supabaseRequest(path, options = {}) {
            const response = await fetch(`${VM_SUPABASE_URL}/rest/v1/${path}`, {
                method: options.method || 'GET',
                headers: {
                    apikey: VM_SUPABASE_ANON_KEY,
                    Authorization: `Bearer ${VM_SUPABASE_ANON_KEY}`,
                    'Content-Type': 'application/json',
                    ...(options.headers || {})
                },
                body: options.body ? JSON.stringify(options.body) : undefined
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`Supabase request failed (${response.status}): ${errText}`);
            }

            if (response.status === 204) return null;
            return response.json();
        }

        function mapSupabaseRows(rows) {
            if (!Array.isArray(rows)) return [];
            return rows.map((row) => ({
                id: row.id,
                category: row.category,
                year: row.year || null,
                title: row.title || `Video ${row.id}`,
                description: row.description || 'No description available',
                publishedAt: row.published_at || new Date().toISOString(),
                viewCount: row.view_count || 'N/A',
                duration: normalizeDurationValue(row.duration) || 'N/A',
                thumbnail: row.thumbnail || `https://img.youtube.com/vi/${row.id}/mqdefault.jpg`
            }));
        }

        async function repairIncompleteSupabaseRows(videos) {
            const targets = (videos || []).filter(hasIncompleteVideoData);
            if (!targets.length) return 0;

            let repaired = 0;
            for (const video of targets) {
                try {
                    const yt = await fetchYouTubeVideoById(video.id);
                    if (!yt) continue;

                    const repairedVideo = {
                        ...video,
                        ...yt.mapped
                    };

                    const ok = await saveVideoToSupabase(repairedVideo, true);
                    if (ok) repaired++;
                } catch (e) {
                    console.log(`Repair failed for ${video.id}:`, e);
                }
            }

            return repaired;
        }

        async function normalizeLegacyDurationRows(rows) {
            const targets = (rows || []).filter((row) => {
                const d = row && row.duration ? String(row.duration) : '';
                return d.startsWith('PT');
            });

            if (!targets.length) return 0;

            let normalizedCount = 0;
            for (const row of targets) {
                const normalized = normalizeDurationValue(row.duration);
                if (!normalized) continue;

                try {
                    await supabaseRequest(`${VM_SUPABASE_VIDEO_TABLE}?id=eq.${encodeURIComponent(row.id)}`, {
                        method: 'PATCH',
                        headers: {
                            Prefer: 'return=minimal'
                        },
                        body: { duration: normalized }
                    });
                    normalizedCount++;
                } catch (err) {
                    console.log(`Duration normalize failed for ${row.id}:`, err);
                }
            }

            return normalizedCount;
        }

        async function syncVideoPage() {
            showSuccess('Syncing video page from Supabase...');
            await loadVideosFromSupabase();
            showSuccess(`Synced ${currentVideos.length} videos from Supabase.`);
        }

        async function loadVideosFromSupabase(skipRepair = false, skipDurationNormalization = false) {
            try {
                const rows = await supabaseRequest(`${VM_SUPABASE_VIDEO_TABLE}?select=id,category,year,title,description,published_at,view_count,duration,thumbnail,created_at&order=created_at.desc`);

                if (!skipDurationNormalization) {
                    const normalizedCount = await normalizeLegacyDurationRows(rows);
                    if (normalizedCount > 0) {
                        await loadVideosFromSupabase(skipRepair, true);
                        showFlashMessage('success', 'Duration Fixed', `Normalized ${normalizedCount} duration values in Supabase.`);
                        return;
                    }
                }

                currentVideos = mapSupabaseRows(rows);

                if (!skipRepair) {
                    const repairedCount = await repairIncompleteSupabaseRows(currentVideos);
                    if (repairedCount > 0) {
                        await loadVideosFromSupabase(true, true);
                        showFlashMessage('success', 'Data Repaired', `Auto-repaired ${repairedCount} incomplete video records.`);
                        return;
                    }
                }

                loadCurrentVideos();
                updateSourceBar('Supabase', currentVideos.length);
                console.log('Videos loaded from Supabase:', currentVideos.length);
            } catch (error) {
                console.log('Could not load from Supabase:', error);
                updateSourceBar('Supabase', 0);
                showFlashMessage('error', 'Connection Error', 'Supabase not accessible. Please check table and RLS configuration.');
            }
        }

        async function saveVideoToSupabase(videoData, skipEnrichment = false) {
            try {
                let normalizedVideo = { ...videoData };

                if (!skipEnrichment && hasIncompleteVideoData(normalizedVideo)) {
                    const yt = await fetchYouTubeVideoById(normalizedVideo.id);
                    if (yt) {
                        normalizedVideo = {
                            ...normalizedVideo,
                            ...yt.mapped
                        };
                    }
                }

                const payload = {
                    id: normalizedVideo.id,
                    category: normalizedVideo.category,
                    year: normalizedVideo.year || null,
                    title: normalizedVideo.title || `Video ${normalizedVideo.id}`,
                    description: normalizedVideo.description || 'No description available',
                    published_at: normalizedVideo.publishedAt || new Date().toISOString(),
                    view_count: normalizedVideo.viewCount || null,
                    duration: normalizeDurationValue(normalizedVideo.duration),
                    thumbnail: normalizedVideo.thumbnail || `https://img.youtube.com/vi/${normalizedVideo.id}/mqdefault.jpg`
                };

                await supabaseRequest(`${VM_SUPABASE_VIDEO_TABLE}`, {
                    method: 'POST',
                    headers: {
                        Prefer: 'resolution=merge-duplicates,return=representation'
                    },
                    body: payload
                });

                console.log('Video saved to Supabase');
                return true;
            } catch (error) {
                console.log('Could not save to Supabase:', error);
                showFlashMessage('warning', 'Warning', 'Could not save to Supabase. Check table schema and RLS policies.');
                return false;
            }
        }

        async function deleteVideoFromSupabase(videoId) {
            try {
                await supabaseRequest(`${VM_SUPABASE_VIDEO_TABLE}?id=eq.${encodeURIComponent(videoId)}`, {
                    method: 'DELETE',
                    headers: {
                        Prefer: 'return=minimal'
                    }
                });
                console.log('Video deleted from Supabase');
                return true;
            } catch (error) {
                console.log('Could not delete from Supabase:', error);
                return false;
            }
        }

        async function updateConfigFileOnServer() {
            try {
                await loadVideosFromSupabase();
                showSuccess('Video list synced with Supabase.');
            } catch (error) {
                console.log('Supabase sync not available:', error);
            }
        }


        function showSuccess(message) {
            showFlashMessage('success', 'Success', message, 3000);
        }

        function showError(message) {
            showFlashMessage('error', 'Error', message, 5000);
        }

        function formatNumber(num) {
            if (num === null || num === undefined || num === '' || num === 'N/A') return 'N/A';
            const n = Number(num);
            if (!Number.isFinite(n)) return 'N/A';
            return new Intl.NumberFormat('en-US', {
                notation: 'compact',
                maximumFractionDigits: 1
            }).format(n);
        }

        function normalizeDurationValue(duration) {
            if (duration === null || duration === undefined) return null;
            const raw = String(duration).trim();
            if (!raw || raw === 'N/A') return null;

            if (/^\d{1,2}:\d{2}(:\d{2})?$/.test(raw)) {
                return raw;
            }

            const match = raw.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
            if (!match) return null;

            const hours = parseInt(match[1] || 0, 10);
            const minutes = parseInt(match[2] || 0, 10);
            const seconds = parseInt(match[3] || 0, 10);

            if (hours > 0) {
                return `${hours}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }

            return `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        function formatDuration(duration) {
            return normalizeDurationValue(duration) || 'N/A';
        }
    </script>
